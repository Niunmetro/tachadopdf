<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="sombra" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="papel">
      <rect x="700" y="96" width="470" height="560" rx="10"/>
    </clipPath>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="6" fill="#38BDF8"/>

  <!-- ===== Columna izquierda: mensaje ===== -->
  <text x="90" y="168" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="700" fill="#F8FAFC">TachadoPDF</text>

  <text x="90" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="35" font-weight="600" fill="#38BDF8">Tacha de verdad los datos</text>
  <text x="90" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="35" font-weight="600" fill="#38BDF8">personales de un PDF.</text>

  <text x="90" y="358" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#CBD5E1">El texto se elimina del archivo.</text>
  <text x="90" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#CBD5E1">No es un rectángulo negro por encima.</text>

  <!-- bullets -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#E2E8F0">
    <circle cx="101" cy="461" r="11" fill="#38BDF8" fill-opacity="0.18"/>
    <path d="M95 461 l4.5 4.5 L108 456" stroke="#38BDF8" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="126" y="469">Todo ocurre en tu navegador</text>

    <circle cx="101" cy="513" r="11" fill="#38BDF8" fill-opacity="0.18"/>
    <path d="M95 513 l4.5 4.5 L108 508" stroke="#38BDF8" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="126" y="521">Informe de comprobación técnica</text>

    <circle cx="101" cy="565" r="11" fill="#38BDF8" fill-opacity="0.18"/>
    <path d="M95 565 l4.5 4.5 L108 560" stroke="#38BDF8" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="126" y="573">DNI · NIE · IBAN · Nº Seg. Social</text>
  </g>

  <text x="90" y="644" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#64748B">Tu documento no se sube a ningún servidor.</text>

  <!-- ===== Columna derecha: documento ===== -->
  <g filter="url(#sombra)">
    <rect x="700" y="96" width="470" height="560" rx="10" fill="#FFFFFF"/>
  </g>
  <g clip-path="url(#papel)">
    <!-- cabecera del documento -->
    <rect x="700" y="96" width="470" height="58" fill="#F1F5F9"/>
    <rect x="732" y="118" width="176" height="13" rx="6" fill="#94A3B8"/>

    <!-- lineas de texto -->
    <g fill="#CBD5E1">
      <rect x="732" y="192" width="406" height="11" rx="5"/>
      <rect x="732" y="220" width="360" height="11" rx="5"/>
    </g>

    <!-- campo 1: etiqueta + dato tachado -->
    <text x="732" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#475569">DNI:</text>
    <rect x="792" y="269" width="150" height="23" rx="3" fill="#0F172A"/>

    <text x="732" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#475569">IBAN:</text>
    <rect x="806" y="319" width="242" height="23" rx="3" fill="#0F172A"/>

    <text x="732" y="386" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#475569">Teléfono:</text>
    <rect x="846" y="369" width="132" height="23" rx="3" fill="#0F172A"/>

    <g fill="#CBD5E1">
      <rect x="732" y="428" width="406" height="11" rx="5"/>
      <rect x="732" y="456" width="330" height="11" rx="5"/>
    </g>

    <!-- sello del informe -->
    <rect x="732" y="512" width="406" height="106" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
    <circle cx="770" cy="551" r="15" fill="#16A34A"/>
    <path d="M763 551 l5 5 L778 545" stroke="#FFFFFF" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="798" y="546" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#14532D">Informe de comprobación</text>
    <text x="798" y="571" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#166534">El texto tachado ya no es</text>
    <text x="798" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#166534">extraíble del archivo.</text>
  </g>
</svg>
