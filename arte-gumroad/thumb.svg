<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="p">
      <rect x="171" y="96" width="258" height="300" rx="8"/>
    </clipPath>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="5" fill="#38BDF8"/>

  <!-- documento con datos tachados -->
  <g filter="url(#s)">
    <rect x="171" y="96" width="258" height="300" rx="8" fill="#FFFFFF"/>
  </g>
  <g clip-path="url(#p)">
    <rect x="171" y="96" width="258" height="34" fill="#F1F5F9"/>
    <rect x="193" y="108" width="96" height="10" rx="5" fill="#94A3B8"/>

    <g fill="#CBD5E1">
      <rect x="193" y="158" width="214" height="9" rx="4"/>
      <rect x="193" y="181" width="176" height="9" rx="4"/>
    </g>

    <!-- datos tachados de verdad -->
    <rect x="193" y="216" width="118" height="19" rx="3" fill="#0F172A"/>
    <rect x="193" y="248" width="182" height="19" rx="3" fill="#0F172A"/>
    <rect x="193" y="280" width="94" height="19" rx="3" fill="#0F172A"/>

    <g fill="#CBD5E1">
      <rect x="193" y="326" width="214" height="9" rx="4"/>
      <rect x="193" y="349" width="150" height="9" rx="4"/>
    </g>
  </g>

  <!-- sello verde de comprobación -->
  <circle cx="415" cy="382" r="34" fill="#16A34A" stroke="#0F172A" stroke-width="5"/>
  <path d="M400 382 l11 11 L432 371" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="300" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" fill="#F8FAFC">TachadoPDF</text>
  <text x="300" y="519" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#38BDF8">El dato se borra del archivo</text>
  <text x="300" y="551" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#64748B">100% en tu navegador · DNI · IBAN · NIE</text>
</svg>
