<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 'wasm-unsafe-eval' es OBLIGATORIO para instanciar mupdf-wasm; permite compilar WebAssembly
         pero NO eval() de JS arbitrario (a diferencia de 'unsafe-eval'). connect-src limita el
         egress a Gumroad; ningun documento sale del navegador. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://api.gumroad.com; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval'; font-src 'self'; object-src 'none'; base-uri 'self'">

    <meta name="google-site-verification" content="0y8mSNb6_j9BfT2wCfVhPP4XowuUkIjkg5jz9M7EBdU" />
    <!-- Verificación de la propiedad de dominio propio www.tachadopdf.com en Search Console. -->
    <meta name="google-site-verification" content="wAB_9e6EFyixB6e1jITVlH5DFp1q5scYBpxHaxlFx9g" />
    <title>TachadoPDF · Tacha de verdad los datos personales de un PDF</title>
    <meta name="description" content="Tacha DNI, IBAN, teléfonos y datos personales de un PDF eliminándolos del archivo (no un rectángulo negro encima), 100% en tu navegador y con informe de comprobación técnica. Para gestorías, administradores de fincas y RRHH." />
    <link rel="canonical" href="https://www.tachadopdf.com/" />

    <!-- Open Graph: cómo se ve el enlace al compartirlo en WhatsApp, LinkedIn, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TachadoPDF" />
    <meta property="og:title" content="TachadoPDF · Tacha de verdad los datos personales de un PDF" />
    <meta property="og:description" content="Elimina DNI, IBAN y datos personales del archivo, no solo un rectángulo por encima. 100% en tu navegador, con informe de comprobación técnica." />
    <meta property="og:image" content="https://www.tachadopdf.com/og-image.png" />
    <meta property="og:url" content="https://www.tachadopdf.com/" />
    <meta property="og:locale" content="es_ES" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TachadoPDF · Tacha de verdad los datos personales de un PDF" />
    <meta name="twitter:description" content="Elimina DNI, IBAN y datos personales del archivo, 100% en tu navegador, con informe de comprobación." />
    <meta name="twitter:image" content="https://www.tachadopdf.com/og-image.png" />

    <!-- Datos estructurados: ayuda a Google a entender que es una app web gratuita con opción Pro. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TachadoPDF",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Navegador web",
      "description": "Tacha datos personales de un PDF eliminándolos del archivo, 100% en el navegador, con informe de comprobación técnica.",
      "url": "https://www.tachadopdf.com/",
      "inLanguage": "es",
      "offers": [
        { "@type": "Offer", "price": "0", "priceCurrency": "EUR", "name": "Gratuito (5 documentos/mes)" },
        { "@type": "Offer", "price": "59", "priceCurrency": "EUR", "name": "Pro (pago único, documentos ilimitados)" }
      ]
    }
    </script>

    <!-- FAQPage: permite que Google muestre las preguntas desplegables en el resultado de busqueda
         (resultado enriquecido). El texto debe coincidir en esencia con el FAQ que ve el usuario. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿No hace esto ya Acrobat Pro?",
          "acceptedAnswer": { "@type": "Answer", "text": "Acrobat Pro también elimina texto de un PDF. TachadoPDF está pensado para quien no paga esa suscripción: funciona en el navegador sin instalar nada, reconoce por sí solo los formatos españoles (DNI, NIE, IBAN, Nº de la Seguridad Social, teléfonos), es un pago único de 59 € en lugar de una cuota anual, y deja un informe de comprobación. Si ya usas Acrobat Pro a diario, es probable que no lo necesites." }
        },
        {
          "@type": "Question",
          "name": "¿Se sube mi documento a algún servidor?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. Todo el proceso ocurre dentro de tu navegador y el archivo no se transmite a ningún sitio. Puedes comprobarlo desconectando internet: la herramienta sigue tachando y descargando el documento sin conexión." }
        },
        {
          "@type": "Question",
          "name": "¿De verdad se borra el dato o solo se tapa?",
          "acceptedAnswer": { "@type": "Answer", "text": "Se elimina del contenido del archivo, no se cubre con un rectángulo por encima. Además, al terminar, la herramienta vuelve a leer el PDF resultante y busca de nuevo los datos: si quedara cualquier resto, te avisa y no da el trabajo por bueno." }
        },
        {
          "@type": "Question",
          "name": "¿Y si se le escapa un dato?",
          "acceptedAnswer": { "@type": "Answer", "text": "La detección automática cubre los formatos habituales, pero puede no verlo todo. Por eso puedes tachar a mano cualquier zona arrastrando el ratón, y debes revisar el documento final página a página antes de entregarlo. La herramienta no sustituye la revisión humana." }
        },
        {
          "@type": "Question",
          "name": "¿Qué diferencia hay entre el modo gratuito y Pro?",
          "acceptedAnswer": { "@type": "Answer", "text": "El modo gratuito permite 5 documentos al mes. Pro es un pago único de 59 € (no una suscripción) que quita ese límite. El tachado y el informe son idénticos en ambos; Pro solo levanta el tope mensual." }
        },
        {
          "@type": "Question",
          "name": "¿Funciona con documentos escaneados?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sobre una imagen escaneada se borran los píxeles de la zona que marques a mano. La detección automática lee texto, no imágenes, así que en un escaneado debes señalar tú las zonas a tachar y revisar el resultado." }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
